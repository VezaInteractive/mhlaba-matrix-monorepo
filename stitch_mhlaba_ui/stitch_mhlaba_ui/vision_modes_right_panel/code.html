<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vision Modes - Sleek Glassmorphism HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#0de3f2",
          "background-light": "#f5f8f8",
          "background-dark": "#102122",
          "hud-bg": "rgba(11, 15, 25, 0.45)",
          "hud-surface": "rgba(255, 255, 255, 0.05)",
          "hud-text": "#E0E7FF",
          "hud-muted": "rgba(224, 231, 255, 0.4)",
          "hud-accent": "#FF0055",
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"],
          "body": ["Manrope", "sans-serif"],
          "mono": ["JetBrains Mono", "monospace"]
        },
        borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
        backgroundImage: {
          'glass-gradient': 'linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%)',
        },
        boxShadow: {
          'glow-primary': 'inset 0 0 20px rgba(13, 227, 242, 0.2)',
        }
      },
    },
  }
</script>
<style>
  body {
    background-color: #05080f; /* Fallback for map */
    background-image: radial-gradient(circle at center, #1a2333 0%, #05080f 100%);
    margin: 0;
    overflow: hidden;
  }
  
  /* Simulate a map background for context */
  .map-background {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(13, 227, 242, 0.05) 50px),
                      repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(13, 227, 242, 0.05) 50px);
    background-size: 50px 50px;
    opacity: 0.6;
    pointer-events: none;
  }

  /* Glassmorphism utilities */
  .glass-panel {
    background-color: rgba(11, 15, 25, 0.45);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  
  .glass-card {
    background-color: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 150ms ease-out;
  }
  
  .glass-card:hover {
    background-color: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
  }
  
  .glass-card:hover .material-symbols-outlined {
    text-shadow: 0 0 8px rgba(13, 227, 242, 0.6);
  }
  
  .glass-card.active {
    border-color: #0de3f2;
    box-shadow: inset 0 0 20px rgba(13, 227, 242, 0.2);
    background-color: rgba(13, 227, 242, 0.05);
  }
  
  .glass-card.active .material-symbols-outlined {
    color: #0de3f2;
    text-shadow: 0 0 12px rgba(13, 227, 242, 0.8);
  }
</style>
</head>
<body class="font-body text-hud-text h-screen w-screen overflow-hidden selection:bg-primary selection:text-background-dark">
<!-- Simulated WebGL Map Background -->
<div class="map-background"></div>
<!-- Main HUD Wrapper -->
<div class="relative w-full h-full pointer-events-none flex items-center justify-end p-6">
<!-- Vision Modes Panel (Right) -->
<div class="w-[320px] glass-panel rounded-lg flex flex-col pointer-events-auto h-auto max-h-[calc(100vh-160px)] shadow-2xl overflow-hidden group/panel transition-all duration-300 hover:border-white/25">
<!-- Shared Component: SectionHeader (Adapted for HUD) -->
<div class="flex-none px-6 pt-5 pb-3 border-b border-white/10 relative">
<!-- Subtle gradient overlay on header -->
<div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
<h3 class="font-display text-[18px] font-bold text-white tracking-[2px] uppercase relative z-10 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
          ACTIVE STYLE
        </h3>
</div>
<!-- Shader Controls Grid -->
<div class="p-6 overflow-y-auto">
<div class="grid grid-cols-2 gap-4">
<!-- Normal Mode (Active) -->
<button class="glass-card active w-full aspect-square rounded-lg flex flex-col items-center justify-center gap-3 group relative cursor-pointer outline-none focus:ring-2 focus:ring-primary/50">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-primary/50 rounded-tl-sm"></div>
<div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-primary/50 rounded-br-sm"></div>
<div class="text-white transition-colors duration-150 relative z-10" data-icon="visibility">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0, 'wght' 300;">visibility</span>
</div>
<h2 class="text-white font-display text-[14px] font-bold tracking-[1.5px] uppercase relative z-10 transition-colors duration-150 group-[.active]:text-primary">NORMAL</h2>
<!-- Active State Glow Underlay -->
<div class="absolute inset-0 bg-primary/5 opacity-100 rounded-lg pointer-events-none"></div>
</button>
<!-- NVG Mode -->
<button class="glass-card w-full aspect-square rounded-lg flex flex-col items-center justify-center gap-3 group relative cursor-pointer outline-none focus:ring-2 focus:ring-white/30 hover:shadow-[inset_0_0_20px_rgba(74,222,128,0.15)] hover:border-green-400/50">
<div class="text-hud-muted transition-all duration-150 group-hover:text-green-400 relative z-10" data-icon="dark_mode">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0, 'wght' 300;">dark_mode</span>
</div>
<h2 class="text-hud-muted font-display text-[14px] font-bold tracking-[1.5px] uppercase relative z-10 transition-colors duration-150 group-hover:text-white">NVG</h2>
</button>
<!-- Thermal Mode -->
<button class="glass-card w-full aspect-square rounded-lg flex flex-col items-center justify-center gap-3 group relative cursor-pointer outline-none focus:ring-2 focus:ring-white/30 hover:shadow-[inset_0_0_20px_rgba(251,146,60,0.15)] hover:border-orange-400/50">
<div class="text-hud-muted transition-all duration-150 group-hover:text-orange-400 relative z-10" data-icon="local_fire_department">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0, 'wght' 300;">local_fire_department</span>
</div>
<h2 class="text-hud-muted font-display text-[14px] font-bold tracking-[1.5px] uppercase relative z-10 transition-colors duration-150 group-hover:text-white">THERMAL</h2>
</button>
<!-- CRT Mode -->
<button class="glass-card w-full aspect-square rounded-lg flex flex-col items-center justify-center gap-3 group relative cursor-pointer outline-none focus:ring-2 focus:ring-white/30 hover:shadow-[inset_0_0_20px_rgba(13,227,242,0.15)] hover:border-primary/50 overflow-hidden">
<!-- Glitch effect pseudo-element (visual only, pure CSS) -->
<div class="absolute inset-0 opacity-0 group-hover:opacity-20 bg-[repeating-linear-gradient(0deg,transparent,transparent_2px,var(--color-primary)_3px)] pointer-events-none transition-opacity duration-300 mix-blend-overlay"></div>
<div class="text-hud-muted transition-all duration-150 group-hover:text-primary relative z-10 group-hover:animate-pulse" data-icon="desktop_windows">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 0, 'wght' 300;">desktop_windows</span>
</div>
<h2 class="text-hud-muted font-display text-[14px] font-bold tracking-[1.5px] uppercase relative z-10 transition-colors duration-150 group-hover:text-white">CRT</h2>
</button>
</div>
</div>
<!-- Decorative Bottom Edge -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mt-auto"></div>
</div>
</div>
</body></html>
