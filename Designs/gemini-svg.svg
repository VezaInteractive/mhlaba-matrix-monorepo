<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="vibraniumCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0057FF" />
    </linearGradient>
    <linearGradient id="egoliGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#05070A" rx="12"/>

  <g transform="translate(180, 150)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#vibraniumCyan)" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#vibraniumCyan)" stroke-width="1.5" stroke-dasharray="4 12 4 40" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="125" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="2 20" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite" />
    </circle>
     
    <path d="M 0 -90 A 45 90 0 0 1 0 90 A 45 90 0 0 1 0 -90" fill="none" stroke="url(#vibraniumCyan)" stroke-width="1" opacity="0.5"/>
    <path d="M -90 0 A 90 30 0 0 1 90 0 A 90 30 0 0 1 -90 0" fill="none" stroke="url(#vibraniumCyan)" stroke-width="1" opacity="0.5"/>
    
    <path d="M -50 40 L -25 -40 L 0 10 L 25 -40 L 50 40 L 30 40 L 15 -10 L 0 20 L -15 -10 L -30 40 Z" fill="url(#egoliGold)" filter="url(#neonGlow)"/>
    
    <circle cx="-25" cy="-40" r="3" fill="#FFF" filter="url(#neonGlow)"/>
    <circle cx="0" cy="20" r="3" fill="#FFF" filter="url(#neonGlow)"/>
    <circle cx="25" cy="-40" r="3" fill="#FFF" filter="url(#neonGlow)"/>
  </g>

  <g transform="translate(350, 140)">
    <text x="0" y="0" font-family="'Space Grotesk', 'Helvetica Neue', sans-serif" font-size="64" font-weight="900" fill="#FFFFFF" letter-spacing="8">MHLABA</text>
    
    <text x="4" y="45" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="22" font-weight="400" fill="url(#vibraniumCyan)" letter-spacing="24" filter="url(#neonGlow)">MATRIX</text>
    
    <rect x="4" y="70" width="140" height="2" fill="url(#egoliGold)" filter="url(#neonGlow)"/>
    <rect x="160" y="70" width="30" height="2" fill="url(#vibraniumCyan)"/>
    <rect x="200" y="70" width="8" height="2" fill="url(#vibraniumCyan)"/>
    
    <text x="4" y="95" font-family="monospace" font-size="10" font-weight="400" fill="#556677" letter-spacing="3">SYS.INIT // MIDRAND_ZA // 2026-04-01 12:01:53 SAST</text>
  </g>
</svg>
